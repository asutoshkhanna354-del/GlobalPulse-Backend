services:
  - type: web
    name: globalpulse-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: echo "pre-built"
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY_NIFTY
        sync: false
      - key: GROQ_API_KEY_BTC
        sync: false
      - key: GROQ_API_KEY_BTC2
        sync: false
      - key: GROQ_API_KEY_USD
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_CONTACT_EMAIL
        sync: false
      - key: SELF_API_URL
        value: https://globalpulse-backend.onrender.com/api
    healthCheckPath: /api/health

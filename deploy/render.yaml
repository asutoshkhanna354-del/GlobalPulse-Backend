databases:
  - name: globalpulse-db
    plan: free
    databaseName: globalpulse
    user: globalpulse

services:
  - type: web
    name: globalpulse-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/market-data/summary
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: globalpulse-db
          property: connectionString
      - key: FINNHUB_API_KEY
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_CONTACT_EMAIL
        sync: false
